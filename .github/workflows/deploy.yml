name: Production Checks

on:
  push:
    branches:
      - main
      - feat/production-upgrade
  pull_request:

jobs:
  import-health-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import app and initialize DB
        env:
          DATABASE_URL: sqlite:///data/ci_app.db
          GITHUB_TOKEN: ""
        run: |
          python - <<'PY'
          from core.database import init_db
          import server
          init_db()
          print(server.app.title)
          PY

      - name: Docker build
        run: docker build -f docker/Dockerfile -t github-repo-intelligence:ci .
